<body class="bg-[#F0FDF4]">

        <div class="max-sm:hidden">
            <ul class="flex space-x-6">
                <li>About</li>
                <li>Gallery</li>
                <li>Plan a Tree</li>
            </ul>
        </div>

        <div class="max-sm:hidden">
            <a href="" class="button">Plant a Tree</a>
        </div>
        
        <div class="dropdown sm:hidden">
            <button class="dropbtn"><i class="fa-solid fa-bars"></i></button>
            <div class="dropdown-content">
                <a href="#">About</a>
                <a href="#">Gallery</a>
                <a href="#">Plan a Tree</a>
            </div>
        </div>
    </nav>

    <!-- navbar | logo | menu | ends here-->

    <!-- banner section -->
    <section>
        <div class="flex items-center bg-[#CFF0DC] max-sm:flex-col">
            <div class="self-end"><img src="assets/hero-leaf1.png" alt=""></div>
            <div class="text-center space-y-4 m-[5%]">
                <h2 class="text-4xl font-bold">Plant a Tree, Grow a Future</h2>
                <p class="px-16">Join our mission to plant 1 million trees and make the Earth greener for future
                    generations.</p>
                <a href="" class="button">Get Involved</a>
            </div>
            <div class="self-end"><img src="assets/hero-leaf2.png" alt=""></div>
        </div>
    </section>

    <!-- main section | tree gallery | category | cart  -->
    <section>
        <div class="m-[5%] text-center text-2xl font-semibold md:flex md:flex-col">
            <h2>Choose Your Trees</h2>
            <div class="grid grid-cols-[1fr_5fr_1fr] max-sm:flex max-sm:flex-col">


                <!-- categories  -->
                <div class="text-left max-sm:hidden">
                    <h2 class="my-2">Categories</h2>
                    <ul id="fruit-category" class="text-left text-sm space-y-1">
                        <li onclick="LoadPlants()">All Trees</li>
                    </ul>
                </div>


                <!-- plants display gallery -->
                <div id="plants-gallery" class="grid grid-cols-3 max-sm:flex max-sm:flex-col">

                    <!-- plant card startes here-->
                    <!-- <div class="flex p-3">
                        <div class="bg-white p-3 rounded-lg flex flex-col h-full">
                            <img src="assets/about.png" alt="" class="rounded-lg h-2/3">
                            <h2 class="text-lg text-left my-auto">Mango Tree</h2>
                            <p class="text-[10px] text-left my-auto">A fast-growing tropical tree that produces delicious, juicy mangoes during summer. Its dense green</p>
                            <ul class="flex justify-between text-sm mt-auto">
                                <li>Category</li>
                                <li>price</li>
                            </ul>
                            <a href="" class="w-full bg-[#15803D] text-white rounded-full text-sm my-2 p-2">Add to Cart</a>
                        </div>
                    </div> -->
                    <!-- plant card end here-->

                </div>

                <!-- cart -->
                <div id="cart-container" class="rounded-lg bg-white p-4 text-left shadow-sm h-fit">
                    <h3 class="text-lg font-semibold mb-3">Cart</h3>
                    <div id="cart-items" class="space-y-2 text-sm"></div>
                    <div class="border-t mt-4 pt-3 flex text-xl">
                        <p class="font-semibold">Total: <span id="cart-total">৳0</span></p>
                    </div>
                </div>


            </div>

        </div>
    </section>

    <script src="index.js"></script>
    <script>
        const cart = [];

        const renderCart = () => {
            const cartItems = document.getElementById("cart-items");
            const cartTotal = document.getElementById("cart-total");

            if (!cartItems || !cartTotal) return;

            if (cart.length === 0) {
                cartItems.innerHTML = '<p class="text-gray-500">Your cart is empty.</p>';
                cartTotal.textContent = "৳0";
                return;
            }

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            cartItems.innerHTML = cart.map((item, index) => `
                <div class="flex items-center justify-between gap-2 rounded border p-2">
                    <div>
                        <p class="font-medium">${item.name}</p>
                        <p class="text-xs text-gray-600">৳${item.price}</p>
                    </div>
                    <button type="button" class="remove-item-btn text-red-500 text-sm" data-index="${index}">❌</button>
                </div>
            `).join("");
            cartTotal.textContent = `৳${total}`;
        };

        const addToCart = (name, price) => {
            cart.push({ name, price: parsePrice(price) });
            renderCart();
        };

        document.getElementById("plants-gallery").addEventListener("click", (event) => {
            const button = event.target.closest(".add-to-cart-btn");
            if (!button) return;

            addToCart(button.dataset.name, button.dataset.price);
        });

        document.getElementById("cart-container").addEventListener("click", (event) => {
            const button = event.target.closest(".remove-item-btn");
            if (!button) return;

            const index = Number(button.dataset.index);
            if (!Number.isNaN(index)) {
                cart.splice(index, 1);
                renderCart();
            }
        });

        renderCart();
    </script>
</body>

</html>
